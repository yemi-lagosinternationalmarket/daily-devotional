services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://devotional:devotional@db:5432/devotional
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devotional
      POSTGRES_USER: devotional
      POSTGRES_PASSWORD: devotional
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - devotional-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devotional"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devotional-data:
