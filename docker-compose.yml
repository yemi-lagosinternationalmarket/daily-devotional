services:
  db:
    image: postgres:16
    container_name: devotional-db
    environment:
      POSTGRES_DB: devotional
      POSTGRES_USER: devotional
      POSTGRES_PASSWORD: devotional
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - devotional-data:/var/lib/postgresql/data

volumes:
  devotional-data:
